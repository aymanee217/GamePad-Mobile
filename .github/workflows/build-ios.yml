name: Build iOS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: GamePad-Mobile/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Build iOS app
        run: flutter build ios --release --no-codesign || true

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r GamePad_Mobile.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: GamePad-Mobile/mobile/GamePad_Mobile.ipa
