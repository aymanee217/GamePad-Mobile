name: Build iOS App

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FLUTTER_VERSION: "3.44.5"

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: GamePad-Mobile/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS debug (no codesign)
        run: flutter build ios --debug --no-codesign

      - name: Prepare .app bundle
        run: |
          mkdir -p output/Payload
          cp -r build/ios/iphoneos/Runner.app output/Payload/
          cd output
          zip -r ../GamepadMobile.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GamepadMobile-iOS
          path: GamePad-Mobile/mobile/GamepadMobile.ipa
          compression-level: 0
